<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Monsterz — classroom tally tracker for rewarding student moments" />
    <meta name="theme-color" content="#7c3aed" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <title>Monsterz</title>
    <script>
      (function () {
        var pref = localStorage.getItem('monsterz-theme') || 'system';
        var dark =
          pref === 'dark' ||
          (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
        if (dark) {
          var gradients = {
            eggplant:
              'linear-gradient(145deg, #1a0a2e 0%, #3b1d5c 38%, #160820 72%, #050208 100%)',
            'royal-plum':
              'linear-gradient(160deg, #2e1065 0%, #4c1d95 42%, #1e0a3a 100%)',
            'midnight-violet':
              'linear-gradient(180deg, #0f0520 0%, #1a1035 45%, #09040f 100%)',
            cosmic:
              'linear-gradient(135deg, #1e1b4b 0%, #4c1d95 50%, #0c0618 100%)',
            aubergine:
              'linear-gradient(125deg, #2a1235 0%, #5b2d6e 40%, #140818 100%)',
            'shadow-grape':
              'linear-gradient(165deg, #12081c 0%, #32204a 55%, #08040e 100%)',
            twilight:
              'linear-gradient(200deg, #1a0f2e 0%, #312e81 48%, #0a0612 100%)',
            'ink-orchid':
              'linear-gradient(145deg, #0c0614 0%, #581c87 35%, #1a0a28 70%, #030106 100%)',
            'smoky-amethyst':
              'linear-gradient(170deg, #18101f 0%, #3f2d56 50%, #0d0812 100%)',
            'violet-dusk':
              'linear-gradient(135deg, #2d1b69 0%, #6d28d9 30%, #1a0a2e 65%, #050208 100%)',
          };
          var gradientId = localStorage.getItem('monsterz-gradient') || 'eggplant';
          var css = gradients[gradientId] || gradients.eggplant;
          document.documentElement.dataset.gradient = gradientId;
          document.documentElement.style.setProperty('--app-gradient', css);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
